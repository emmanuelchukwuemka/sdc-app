server {
    listen 80;
    listen [::]:80;
    server_name surrogateanddonorconnect.com www.surrogateanddonorconnect.com;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

